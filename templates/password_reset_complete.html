<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset Complete — MediBot AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px;width:100%;max-width:420px;text-align:center;}
    .icon{font-size:3rem;margin-bottom:20px;}
    h2{font-size:1.3rem;font-weight:700;color:#f1f5f9;margin-bottom:10px;}
    p{font-size:0.88rem;color:rgba(255,255,255,0.4);line-height:1.7;margin-bottom:28px;}
    .btn{display:inline-block;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:12px;padding:12px 28px;color:#fff;font-size:0.9rem;font-weight:600;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 16px rgba(56,189,248,0.3);}
    .btn:hover{transform:translateY(-2px);}
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🎉</div>
  <h2>Password Reset Complete!</h2>
  <p>Your password has been set successfully. You can now login with your new password.</p>
  <a href="/login/" class="btn">→ Login Now</a>
</div>
</body>
</html>
