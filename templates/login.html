<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediBot Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .container{width:100%;max-width:420px;padding:20px;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 4px 20px rgba(56,189,248,0.4);}
    .logo-text{font-size:1.6rem;font-weight:700;color:#fff;}
    .logo-sub{font-size:0.75rem;color:rgba(255,255,255,0.4);text-align:center;margin-top:-24px;margin-bottom:32px;letter-spacing:0.05em;}
    h2{font-size:1.3rem;font-weight:600;color:#f1f5f9;margin-bottom:8px;text-align:center;}
    .sub{font-size:0.85rem;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:28px;}
    .field{margin-bottom:18px;}
    label{display:block;font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:7px;}
    input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:#f1f5f9;font-size:0.93rem;outline:none;transition:all 0.2s;}
    input:focus{border-color:rgba(56,189,248,0.5);background:rgba(56,189,248,0.05);}
    input::placeholder{color:rgba(255,255,255,0.2);}
    .btn{width:100%;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;padding:14px;color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 4px 20px rgba(56,189,248,0.3);}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(56,189,248,0.4);}
    .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px 16px;color:#fca5a5;font-size:0.83rem;margin-bottom:18px;}
    .divider{text-align:center;color:rgba(255,255,255,0.2);font-size:0.8rem;margin:20px 0;}
    .register-link{text-align:center;font-size:0.85rem;color:rgba(255,255,255,0.35);}
    .register-link a{color:#38bdf8;text-decoration:none;font-weight:500;}
    .register-link a:hover{color:#7dd3fc;}
    .features{display:flex;gap:16px;margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);}
    .feat{flex:1;text-align:center;}
    .feat-icon{font-size:1.2rem;margin-bottom:4px;}
    .feat-text{font-size:0.7rem;color:rgba(255,255,255,0.25);}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💊</div>
      <div class="logo-text">MediBot</div>
    </div>
    <div class="logo-sub">AI MEDICAL ASSISTANT</div>
    <h2>Welcome back</h2>
    <div class="sub">Sign in to your account to continue</div>

    {% if form.errors %}
    <div class="error">❌ Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autofocus/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password"/>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="divider">— or —</div>
    <div class="register-link">Don't have an account? <a href="/register/">Create one</a></div>

    <div class="features">
      <div class="feat"><div class="feat-icon">🔒</div><div class="feat-text">Secure Login</div></div>
      <div class="feat"><div class="feat-icon">💬</div><div class="feat-text">Your History</div></div>
      <div class="feat"><div class="feat-icon">📊</div><div class="feat-text">Personal Data</div></div>
    </div>
  </div>
</div>
</body>
</html>
