<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — MediBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .container{width:100%;max-width:420px;padding:20px;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px;}
    .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
    .logo-text{font-size:1.5rem;font-weight:700;color:#fff;}
    h2{font-size:1.2rem;font-weight:600;color:#f1f5f9;margin-bottom:8px;text-align:center;}
    .sub{font-size:0.84rem;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:28px;}
    .field{margin-bottom:18px;}
    label{display:block;font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:7px;}
    input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:#f1f5f9;font-size:0.93rem;outline:none;transition:all 0.2s;}
    input:focus{border-color:rgba(56,189,248,0.5);background:rgba(56,189,248,0.05);}
    input::placeholder{color:rgba(255,255,255,0.2);}
    .btn{width:100%;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;padding:14px;color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 4px 20px rgba(56,189,248,0.3);}
    .btn:hover{transform:translateY(-1px);}
    .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px 16px;color:#fca5a5;font-size:0.83rem;margin-bottom:16px;}
    .invalid{text-align:center;color:rgba(255,255,255,0.4);padding:20px 0;}
    .back{display:block;text-align:center;margin-top:20px;color:#38bdf8;text-decoration:none;font-size:0.85rem;}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💊</div>
      <div class="logo-text">MediBot</div>
    </div>
    <h2>🔑 Set New Password</h2>
    <div class="sub">Enter your new password below</div>

    {% if validlink %}
      {% if form.errors %}
        <div class="error">❌ Please fix the errors below.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label>New Password</label>
          <input type="password" name="new_password1" placeholder="Enter new password"/>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" name="new_password2" placeholder="Confirm new password"/>
        </div>
        <button type="submit" class="btn">Reset Password →</button>
      </form>
    {% else %}
      <div class="invalid">⚠️ This reset link is invalid or has expired.<br><br>Please request a new one.</div>
    {% endif %}

    <a href="/login/" class="back">← Back to Login</a>
  </div>
</div>
</body>
</html>
