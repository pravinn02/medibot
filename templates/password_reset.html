<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — MediBot AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px;width:100%;max-width:420px;}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 4px 15px rgba(56,189,248,0.4);}
    .logo-text{font-size:1.4rem;font-weight:700;color:#fff;}
    h2{font-size:1.3rem;font-weight:700;color:#f1f5f9;margin-bottom:8px;text-align:center;}
    .sub{font-size:0.88rem;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:28px;line-height:1.6;}
    label{display:block;font-size:0.82rem;color:rgba(255,255,255,0.5);margin-bottom:6px;font-weight:500;}
    input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#f1f5f9;font-size:0.92rem;outline:none;transition:all 0.2s;margin-bottom:20px;}
    input:focus{border-color:rgba(56,189,248,0.5);background:rgba(255,255,255,0.08);}
    input::placeholder{color:rgba(255,255,255,0.25);}
    .btn{width:100%;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;padding:13px;color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(56,189,248,0.3);}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(56,189,248,0.4);}
    .back{display:block;text-align:center;margin-top:20px;font-size:0.84rem;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s;}
    .back:hover{color:#38bdf8;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">💊</div>
    <span class="logo-text">MediBot</span>
  </div>
  <h2>Reset Password</h2>
  <p class="sub">Enter your registered email address and we'll send you a link to reset your password.</p>
  <form method="post">
    {% csrf_token %}
    <label>Email Address</label>
    <input type="email" name="email" placeholder="Enter your email" required autofocus/>
    <button type="submit" class="btn">📧 Send Reset Link</button>
  </form>
  <a href="/login/" class="back">← Back to Login</a>
</div>
</body>
</html>
